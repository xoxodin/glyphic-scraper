<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glyphic Scraper - Candyland Edition</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&family=Fredoka+One&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Quicksand', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      background: repeating-linear-gradient(90deg, #ffecd2, #ffecd2 40px, #fff5e1 40px, #fff5e1 80px, #d1f2eb 80px, #d1f2eb 120px, #e1f5fe 120px, #e1f5fe 160px);
      background-size: 160px 100%;
      animation: scrollBg 10s linear infinite;
      overflow: hidden;
    }
    @keyframes scrollBg { from { background-position: 0 0; } to { background-position: 160px 0; } }
    .pet { position: absolute; font-size: 3rem; pointer-events: none; transition: 0.1s; }
    .container {
      position: relative;
      background: white;
      padding: 30px;
      border-radius: 40px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 500px;
      text-align: center;
      animation: melt 4s ease-in-out infinite;
      clip-path: polygon(0 0, 100% 0, 100% 85%, 90% 92%, 80% 85%, 70% 92%, 60% 85%, 50% 92%, 40% 85%, 30% 92%, 20% 85%, 10% 92%, 0 85%);
    }
    @keyframes melt { 0%, 100% { clip-path: polygon(0 0, 100% 0, 100% 85%, 90% 92%, 80% 85%, 70% 92%, 60% 85%, 50% 92%, 40% 85%, 30% 92%, 20% 85%, 10% 92%, 0 85%); } 50% { clip-path: polygon(0 0, 100% 0, 100% 88%, 90% 95%, 80% 88%, 70% 95%, 60% 88%, 50% 95%, 40% 88%, 30% 95%, 20% 88%, 10% 95%, 0 88%); } }
    h1 { font-family: 'Fredoka One', cursive; color: #ff6f91; font-size: 1.8rem; margin-bottom: 8px; }
    .kaomoji-row { font-size: 1.5rem; margin: 10px 0; }
    .url-input {
      width: 100%;
      height: 80px;
      border: 3px solid #ffb6c1;
      border-radius: 20px;
      padding: 15px;
      box-sizing: border-box;
      font-size: 1rem;
      font-family: 'Quicksand', sans-serif;
      resize: none;
      margin: 15px 0;
      background: #fff0f5;
    }
    .url-input:focus { outline: none; border-color: #ff6f91; }
    .btn-row { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; margin: 15px 0; }
    .btn {
      background-color: #4ecdc4;
      background-image: repeating-linear-gradient(45deg, transparent, transparent 5px, rgba(255,255,255,0.3) 5px, rgba(255,255,255,0.3) 10px);
      background-size: 200% 100%;
      animation: pinstripes 2s linear infinite, btnBounce 2s infinite ease-in-out;
      border: none;
      padding: 12px 25px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      border-radius: 20px;
      font-size: 1rem;
      min-width: 120px;
      position: relative;
    }
    .btn::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 50%;
      width: 12px;
      height: 20px;
      background: inherit;
      border-radius: 0 0 10px 10px;
      animation: drip 1.5s ease-in-out infinite;
      transform: translateX(-50%);
      filter: blur(2px);
    }
    .btn-stop { background-color: #ff6f61; }
    .btn-clear { background-color: #ffeaa7; color: #333; }
    .btn-download { background-color: #a29bfe; }
    @keyframes pinstripes { from { background-position: 0 0; } to { background-position: 100% 0; } }
    @keyframes btnBounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    @keyframes drip { 0%, 100% { height: 0; opacity: 0.8; } 50% { height: 30px; opacity: 0.4; } }
    #debug {
      background: #111;
      color: #00ff00;
      font-family: monospace;
      font-size: 0.75rem;
      padding: 12px;
      border-radius: 10px;
      margin-top: 15px;
      height: 120px;
      overflow-y: auto;
      text-align: left;
      white-space: pre-wrap;
    }
    .running { color: #00ff00; }
    .error { color: #ff4444; }
    .success { color: #00ff00; }
  </style>
</head>
<body>
  <div class="pet" id="pet">(H ◕ ᴕ H)</div>
  <div class="container">
    <h1>Glyphic Scraper</h1>
    <div class="kaomoji-row" id="header-kao">( ᴔ ◕ ᴕ ᴔ )</div>
    <textarea class="url-input" id="urls" placeholder="Paste URLs here (one per line)..."></textarea>
    <div class="btn-row">
      <button class="btn" onclick="startCrawl()">Start Scrape</button>
      <button class="btn btn-stop" onclick="stopCrawl()">STOP</button>
      <button class="btn btn-clear" onclick="clearDebug()">Clear</button>
      <button class="btn btn-download" onclick="downloadData()">JSON</button>
    </div>
    <div id="debug">System Online...</div>
  </div>
  <script>
    const debug = document.getElementById('debug');
    const pet = document.getElementById('pet');
    const kao = document.getElementById('header-kao');
    let lastX = 0, lastY = 0, lastTime = 0;

    const log = (msg, cls) => {
      const time = new Date().toLocaleTimeString();
      const line = document.createElement('div');
      line.className = cls || '';
      line.textContent = '[' + time + '] ' + msg;
      debug.appendChild(line);
      debug.scrollTop = debug.scrollHeight;
    };

    const faces = ['(H ◕ \u1D15 H)', '( ⊙ \u0358 \u0358 )', '( ˃ \u0334 \u0334 )', '( ˃ \\ \u035F )'];
    document.addEventListener('mousemove', (e) => {
      pet.style.left = (e.clientX - 20) + 'px';
      pet.style.top = (e.clientY - 20) + 'px';
      const now = Date.now();
      const dx = e.clientX - lastX, dy = e.clientY - lastY;
      const speed = Math.sqrt(dx*dx + dy*dy) / (now - lastTime || 1);
      let faceIndex = 0;
      if (speed > 5) faceIndex = 3;
      else if (speed > 2) faceIndex = 2;
      else if (speed > 0.5) faceIndex = 1;
      pet.textContent = faces[faceIndex];
      lastX = e.clientX; lastY = e.clientY; lastTime = now;
      const rect = kao.getBoundingClientRect();
      const relX = (e.clientX - rect.left) / rect.width - 0.5;
      const eyeOffset = Math.round(relX * 2);
      const eyes = ['\u25D5', '\u00B7', '\u2981'];
      const eye = eyes[Math.max(0, Math.min(2, eyeOffset + 1))];
      if (speed < 1) kao.textContent = '( ' + eye + ' \u1D15 \u25D5 )';
    });

    async function startCrawl() {
      const urls = document.getElementById('urls').value.split('\n').filter(Boolean);
      if (!urls.length) { log('No URLs provided', 'error'); return; }
      log('Starting scrape process...', 'running');
      for (const url of urls) {
        log('Processing: ' + url, 'running');
        try {
          const res = await fetch('http://localhost:5000/api/crawl', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ urls: [url] })
          });
          const data = await res.json();
          if (data.success) log('Success: ' + data.output.message, 'success');
          else log('Error: ' + data.error, 'error');
        } catch (e) {
          log('Fetch failed: ' + e.message, 'error');
        }
      }
      log('Process finished.', 'running');
    }

    async function stopCrawl() {
      try {
        await fetch('http://localhost:5000/api/stop', { method: 'POST' });
        log('Scraper stopped.', 'success');
      } catch (e) { log('Stop failed: ' + e.message, 'error'); }
    }

    function clearDebug() { debug.innerHTML = 'System cleared.'; }

    function downloadData() {
      fetch('http://localhost:5000/api/crawl', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ urls: [], mode: 'fetch', maxPages: 1 })
      }).then(r => r.json()).then(d => {
        const blob = new Blob([JSON.stringify(d, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'scraper-output.json';
        a.click();
        log('JSON downloaded.', 'success');
      }).catch(e => log('Download failed: ' + e.message, 'error'));
    }
  </script>
</body>
</html>
